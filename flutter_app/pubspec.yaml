name: dermavision_plus
description: AI-powered skin disease detection app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.5.6

  # HTTP
  http: ^1.2.1

  # Google Fonts
  google_fonts: ^6.2.1

  # Image picker
  image_picker: ^1.1.2

  # OpenStreetMap map display
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Geolocation
  geolocator: ^12.0.0

  # URL launcher
  url_launcher: ^6.3.0

  # Icons
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  # No on-device model assets needed — inference runs on the FastAPI backend
